# lemp.conf — lemp-manager configuration
# Edit this file to override defaults.

# PHP version to install (Sury repo used for multi-version support)
# Options: 8.2, 8.3, 8.4, 8.5
PHP_VERSION="8.4"

# Web root base directory (sites live at $WEB_ROOT/$domain)
WEB_ROOT="/var/www"

# Set to true when the server sits behind a reverse proxy that terminates TLS
# (e.g. a Cloudflare Tunnel).  WordPress sites will be installed with https://
# URLs and wp-config.php will receive an X-Forwarded-Proto → HTTPS shim so
# WordPress does not enter a redirect loop.
BEHIND_PROXY="false"
